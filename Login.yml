info:
  name: Login
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/auth/login"
  body:
    type: json
    data: |-
      {
        "username": "admin",
        "password": "admin123"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.body.data;

        bru.setEnvVar("accessToken", data.accessToken);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
